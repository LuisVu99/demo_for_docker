name: CI/CD with Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t qa-tester .

    - name: Run tests
      run: docker run qa-tester

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v3

    # 1. Login Docker Hub
    - name: Login Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 2. Build lại image (job khác nên phải build lại)
    - name: Build image
      run: docker build -t qa-tester .

    # 3. Tag image
    - name: Tag image
      run: docker tag qa-tester ${{ secrets.DOCKER_USERNAME }}/qa-tester:latest

    # 4. Push lên Docker Hub
    - name: Push image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/qa-tester:latest